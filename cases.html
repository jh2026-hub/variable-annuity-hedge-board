<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>자료실</title>
<style>
:root{--pay:#5C82CF;--leak:#D69A55;--sym:#9282DC;--bad:#D6738A;--good:#4FAE8C;--good-ink:#337A5F;--pay-ink:#4A6FC4;--ink:#1F2A44;--muted:#566275;--hair:#E3E8F2;--panel:#FFFFFF;--bg:#F3F5FA}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);line-height:1.65;padding:16px 13px 70px;max-width:820px;margin:0 auto;font-size:13.5px}
h1{font-size:18px;font-weight:800;margin:4px 0 2px}
.sub{font-size:12px;color:var(--muted);margin-bottom:12px}
/* 게이트 */
#gate{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:26px 20px;text-align:center;margin-top:12vh}
#gate .lock{font-size:34px}
#gate p{font-size:13px;color:var(--muted);margin:10px 0 16px}
#pw{font-size:20px;letter-spacing:8px;text-align:center;width:180px;padding:10px;border:1.5px solid var(--hair);border-radius:10px;font-family:inherit}
#go{display:block;margin:14px auto 0;min-height:44px;padding:10px 30px;background:var(--pay);color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer}
#gerr{color:var(--bad);font-size:12.5px;font-weight:700;min-height:1.4em;margin-top:10px}
#doc{display:none}
/* 탭 */
.ctabs{position:sticky;top:0;z-index:9;display:flex;gap:6px;overflow-x:auto;padding:10px 2px;background:var(--bg);-webkit-overflow-scrolling:touch}
.ctabs button{flex:0 0 auto;min-height:40px;padding:8px 14px;border:1px solid var(--hair);background:var(--panel);border-radius:99px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer;white-space:nowrap}
.ctabs button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.cpage{display:none;animation:pin .35s ease both}
.cpage.on{display:block}
@keyframes pin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
/* 본문 요소 */
h2{font-size:16.5px;font-weight:800;margin:16px 0 8px}
h3{font-size:14px;font-weight:800;margin:20px 0 8px;padding-top:14px;border-top:1px solid var(--hair)}
.lead{font-size:13.5px;color:var(--ink)}
p{margin:6px 0}
.note{font-size:11px;color:var(--muted);background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:8px 11px;margin:8px 0}
.src{font-size:11px;color:#8a93a8;margin-top:4px}
.vtag,.ctag,.mtag{font-size:9.5px;font-weight:800;padding:1.5px 7px;border-radius:6px;white-space:nowrap;vertical-align:1px}
.vtag{background:#E4F6EE;color:var(--good-ink)}
.ctag{background:#EEF3FE;color:var(--pay-ink)}
.mtag{background:#F1EEFB;color:#7B84D4}
.kchips{display:flex;flex-wrap:wrap;gap:6px;margin:8px 0}
.kc{background:var(--panel);border:1px solid var(--hair);border-radius:9px;padding:6px 10px;font-size:11.5px;color:var(--muted);line-height:1.45}
.kc b{display:block;font-size:15px;color:var(--ink);letter-spacing:-.2px}
.kc small{display:block;font-size:10px;color:#8a93a8}
.mkt{background:#F7F5FE;border:1px solid #E4DEF8;border-radius:12px;padding:11px 13px;margin:10px 0;font-size:12.5px}
.mkt>b{font-size:12px}
.insight{background:#EEF3FE;border:1px solid #D7E0F5;border-radius:12px;padding:12px 14px;margin:16px 0 6px;font-size:13px;line-height:1.7}
/* 타임라인 */
.tlh{display:flex;flex-direction:column;gap:0;margin:10px 0}
.tlrow{display:flex;gap:10px;padding:7px 0;border-left:2.5px solid var(--hair);padding-left:12px;position:relative;margin-left:44px}
.tlrow:before{content:"";position:absolute;left:-6px;top:14px;width:9px;height:9px;border-radius:50%;background:var(--pay);border:2px solid #fff}
.tly{position:absolute;left:-56px;top:9px;width:44px;text-align:right;font-size:10.5px;font-weight:800;color:var(--muted)}
.tlc{font-size:12.5px;line-height:1.6;background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:8px 11px;flex:1}
.tlc.bad{border-left:3px solid var(--bad)}
.tlc.good{border-left:3px solid var(--good)}
/* 가로 막대 */
.bars{display:flex;flex-direction:column;gap:8px;margin:10px 0}
.brow{display:flex;align-items:center;gap:9px}
.bl{flex:0 0 118px;font-size:11.5px;font-weight:700;color:var(--muted);text-align:right;line-height:1.3}
.bars.big .bl{flex-basis:160px}
.btrack{flex:1;height:16px;background:var(--panel);border:1px solid var(--hair);border-radius:6px;overflow:hidden;display:flex}
.bfill{height:100%;border-radius:5px;animation:grow 1s cubic-bezier(.2,.8,.2,1) both;transform-origin:left}
.bfill.bad{background:linear-gradient(90deg,#E09AAB,var(--bad))}
.bfill.sym{background:linear-gradient(90deg,#B5A9E8,var(--sym))}
.bfill.good{background:linear-gradient(90deg,#8CCBB0,var(--good))}
.bfill.pay2{background:linear-gradient(90deg,#9DB4E4,var(--pay))}
@keyframes grow{from{transform:scaleX(0)}}
.bv{flex:0 0 62px;font-size:12.5px;font-weight:800;color:var(--ink)}
/* 인과 체인 */
.flow{display:flex;flex-wrap:wrap;align-items:stretch;gap:6px;margin:10px 0}
.fb{background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:7px 11px;font-size:12px;font-weight:700;line-height:1.4;display:flex;flex-direction:column;justify-content:center}
.fb small{font-weight:600;color:var(--muted);font-size:10.5px}
.fb.bad{border-color:#F1CAD3;background:#FBF2F4}
.fb.good{border-color:#CDE9DB;background:#F4FBF7}
.fa{align-self:center;color:#AAB4C6;font-weight:800}
/* 표 */
.ctb{width:100%;border-collapse:collapse;font-size:12px;margin:10px 0;background:var(--panel);border-radius:10px;overflow:hidden}
.ctb th{background:#EDF0F7;text-align:left;padding:8px 10px;font-size:11px;color:var(--muted)}
.ctb td{padding:8px 10px;border-top:1px solid var(--hair);line-height:1.55}
.tbwrap{overflow-x:auto}
/* 분기 세로막대 */
.qbars{display:flex;gap:14px;align-items:flex-end;height:150px;margin:12px 4px;padding:0 6px}
.qb{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;justify-content:flex-end}
.qbt{width:100%;max-width:64px;height:96px;display:flex;align-items:flex-end;background:var(--panel);border:1px solid var(--hair);border-radius:7px;overflow:hidden}
.qbf{width:100%;animation:growv 1s cubic-bezier(.2,.8,.2,1) both;transform-origin:bottom}
.qbf.bad{background:linear-gradient(0deg,var(--bad),#E09AAB)}
.qbf.good{background:linear-gradient(0deg,var(--good),#8CCBB0)}
@keyframes growv{from{transform:scaleY(0)}}
.qbl{font-size:10.5px;font-weight:800;color:var(--muted)}
.qbv{font-size:11px;font-weight:800}
.qbv.bad{color:var(--bad)}.qbv.good{color:var(--good-ink)}
.scnav{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.scnav button{min-height:36px;padding:6px 12px;border:1px solid var(--hair);background:var(--panel);border-radius:99px;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--pay-ink);cursor:pointer}
details.act{margin:4px 0}
details.act summary{font-size:14px;font-weight:800;padding:13px 0 9px;border-top:1px solid var(--hair);cursor:pointer;list-style:none;min-height:44px;display:flex;align-items:center;gap:8px}
details.act summary::-webkit-details-marker{display:none}
details.act .dh{font-size:10.5px;font-weight:700;color:var(--pay);background:#EEF3FE;border-radius:7px;padding:2px 8px}
details.act[open] .dh{display:none}
.cw{background:#fff;border:1px solid var(--hair);border-radius:11px;padding:8px 6px;margin:10px 0}
.cw svg{width:100%;height:auto;display:block;font-family:inherit}
.qq{background:var(--panel);border:1px solid var(--hair);border-left:3.5px solid var(--sym);border-radius:11px;padding:11px 13px;margin:10px 0}
.qq.good{border-left-color:var(--good)}
.qh{font-size:12.5px;font-weight:800}
.qh small{color:var(--muted);font-weight:600;font-size:11px}
.qt{font-size:13px;line-height:1.75;margin:7px 0;color:var(--ink)}
.qt small{display:block;color:#8a93a8;font-size:10.5px;font-style:italic;margin-top:4px;line-height:1.5}
.qx{font-size:11.5px;color:var(--muted);line-height:1.6;border-top:1px dashed var(--hair);padding-top:6px}
.whyul,.frameol{font-size:12.8px;line-height:1.75;padding-left:20px;display:flex;flex-direction:column;gap:7px;margin:8px 0}
</style></head><body>
<div id="gate">
  <div class="lock">🔒</div>
  <p>열람 코드를 입력하세요</p>
  <input id="pw" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
  <button id="go">열기</button>
  <div id="gerr"></div>
</div>
<div id="doc">
  <h1>변액보증 헷지 — 사례 분석집</h1>

  <div id="content"></div>
</div>

const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw=document.getElementById('pw').value.trim();
  const err=document.getElementById('gerr');
  if(!pw){err.textContent='코드를 입력하세요';return;}
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(BLOB.s),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(BLOB.i)},key,b2a(BLOB.d));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
    document.getElementById('doc').style.display='block';
    try{sessionStorage.setItem('ck',pw);}catch(e){}
    renderKR();
  }catch(e){ err.textContent='코드가 맞지 않아요'; document.getElementById('pw').value=''; }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
try{const c=sessionStorage.getItem('ck');if(c){document.getElementById('pw').value=c;unlock();}}catch(e){}
/* 실측 시계열: KOSPI·국고20Y (동일 저장소 data/market.json) */
async function renderKR(){
  const box=document.getElementById('krsvg'); if(!box) return;
  try{
    const r=await fetch('./data/market.json'); if(!r.ok) throw 0;
    const d=await r.json();
    let i0=d.dates.findIndex(x=>x>='20200101'); if(i0<0)i0=0;
    let i1=d.dates.findIndex(x=>x>='20230101'); if(i1<0)i1=d.dates.length;
    const eq=[],y20=[],dts=[];
    for(let i=i0;i<i1;i++){eq.push(d.eq[i]);y20.push(d.y20[i]);dts.push(d.dates[i]);}
    const W=560,H=240,L=8,R=8,T=20,B=26,iw=W-L-R,ih=H-T-B;
    const eMin=Math.min(...eq),eMax=Math.max(...eq),rMin=Math.min(...y20),rMax=Math.max(...y20);
    const X=k=>L+iw*k/(eq.length-1);
    const Ye=v=>T+ih*(1-(v-eMin)/(eMax-eMin)), Yr=v=>T+ih*(1-(v-rMin)/(rMax-rMin));
    const path=(a,Y)=>a.map((v,k)=>(k?'L':'M')+X(k).toFixed(1)+' '+Y(v).toFixed(1)).join(' ');
    const g=[];
    let cy=null;
    dts.forEach((x,k)=>{const yr=x.slice(0,4); if(yr!==cy){cy=yr;
      g.push('<line x1="'+X(k).toFixed(1)+'" y1="'+T+'" x2="'+X(k).toFixed(1)+'" y2="'+(T+ih)+'" stroke="#EEF1F7"/>');
      g.push('<text x="'+(X(k)+4).toFixed(1)+'" y="'+(H-8)+'" font-size="10.5" fill="#8a93a8" font-weight="700">'+yr+'</text>');}});
    g.push('<path d="'+path(y20,Yr)+'" fill="none" stroke="var(--leak)" stroke-width="1.8" opacity="0.9"/>');
    g.push('<path d="'+path(eq,Ye)+'" fill="none" stroke="var(--pay)" stroke-width="2"/>');
    g.push('<text x="'+(L+4)+'" y="'+(T-6)+'" font-size="10" font-weight="800" fill="var(--pay)">KOSPI '+Math.round(eMin)+'~'+Math.round(eMax)+'</text>');
    g.push('<text x="'+(W-R-4)+'" y="'+(T-6)+'" text-anchor="end" font-size="10" font-weight="800" fill="var(--leak)">국고20Y '+rMin.toFixed(1)+'~'+rMax.toFixed(1)+'%</text>');
    const EV=[['20200319','①','eq'],['20201230','②','eq'],['20220630','③','rate'],['20221024','④','rate']];
    EV.forEach(ev=>{let k;
      if(ev[1]==='④'){k=-1;let m=-1e9;dts.forEach((x,j)=>{if(x>='20220401'&&y20[j]>m){m=y20[j];k=j;}});}
      else k=dts.findIndex(x=>x>=ev[0]);
      if(k<0)return;
      const isEq=ev[2]==='eq', y=isEq?Ye(eq[k]):Yr(y20[k]), c=isEq?'var(--pay)':'var(--leak)';
      g.push('<circle cx="'+X(k).toFixed(1)+'" cy="'+y.toFixed(1)+'" r="5.5" fill="'+c+'" stroke="#fff" stroke-width="1.6"/>');
      g.push('<text x="'+X(k).toFixed(1)+'" y="'+(y-10).toFixed(1)+'" text-anchor="middle" font-size="11" font-weight="800" fill="var(--ink)">'+ev[1]+'</text>');});
    box.innerHTML=g.join('');
  }catch(e){ box.innerHTML='<text x="280" y="120" text-anchor="middle" font-size="12" fill="#8a93a8">시장 데이터를 불러오지 못했어요 (data/market.json)</text>'; }
}
/* 탭 전환 (본문은 복호화 후 주입되므로 위임 방식) */
document.addEventListener('click',e=>{
  const sc=e.target.closest('[data-sc]');
  if(sc){const t=document.getElementById(sc.dataset.sc); if(t)t.scrollIntoView({behavior:'smooth',block:'start'}); return;}
  const b=e.target.closest('[data-ct]'); if(!b)return;
  document.querySelectorAll('.ctabs button').forEach(x=>x.classList.toggle('on',x===b));
  document.querySelectorAll('.cpage').forEach(p=>p.classList.toggle('on',p.id===b.dataset.ct));
  window.scrollTo({top:0,behavior:'smooth'});
});
</script></body></html>
