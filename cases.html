<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow">
<title>자료실</title>
<style>
:root{--pay:#5C82CF;--leak:#D69A55;--sym:#9282DC;--bad:#D6738A;--good:#4FAE8C;--good-ink:#337A5F;--ink:#1F2A44;--muted:#566275;--hair:#E3E8F2;--panel:#FFFFFF;--bg:#F3F5FA}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;padding:18px 14px 60px;max-width:760px;margin:0 auto}
h1{font-size:18px;font-weight:800;margin:6px 0 2px}
.sub{font-size:12px;color:var(--muted);margin-bottom:16px}
/* 게이트 */
#gate{background:var(--panel);border:1px solid var(--hair);border-radius:14px;padding:26px 20px;text-align:center;margin-top:12vh}
#gate .lock{font-size:34px}
#gate p{font-size:13px;color:var(--muted);margin:10px 0 16px}
#pw{font-size:20px;letter-spacing:8px;text-align:center;width:180px;padding:10px;border:1.5px solid var(--hair);border-radius:10px;font-family:inherit}
#go{display:block;margin:14px auto 0;min-height:44px;padding:10px 30px;background:var(--pay);color:#fff;border:none;border-radius:10px;font-family:inherit;font-weight:800;font-size:14px;cursor:pointer}
#gerr{color:var(--bad);font-size:12.5px;font-weight:700;min-height:1.4em;margin-top:10px}
/* 본문 */
#doc{display:none}
.note{font-size:11.5px;color:var(--muted);background:var(--panel);border:1px solid var(--hair);border-radius:10px;padding:9px 12px;margin:10px 0}
.era{margin-top:22px}
.era h2{font-size:15.5px;font-weight:800;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--hair)}
.era h2 small{font-size:12px;color:var(--muted);font-weight:600}
.case{background:var(--panel);border:1px solid var(--hair);border-radius:13px;padding:13px 14px;margin-bottom:10px}
.case.bad{border-left:4px solid var(--bad)}
.case.good{border-left:4px solid var(--good)}
.chead{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.stance{font-size:10px;font-weight:800;padding:2px 8px;border-radius:7px}
.stance.un{background:#F9E9ED;color:#B44E66}
.stance.pa{background:#FBF4E8;color:#A96A1C}
.stance.he{background:#E4F6EE;color:var(--good-ink)}
.vtag,.ctag{font-size:9.5px;font-weight:800;padding:1.5px 7px;border-radius:6px;white-space:nowrap}
.vtag{background:#E4F6EE;color:var(--good-ink)}
.ctag{background:#EEF3FE;color:#4A6FC4}
.kchips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
.kc{background:var(--bg);border:1px solid var(--hair);border-radius:9px;padding:6px 10px;font-size:11.5px;color:var(--muted);line-height:1.45}
.kc b{display:block;font-size:15px;color:var(--ink);letter-spacing:-.2px}
.kc small{display:block;font-size:10px;color:#8a93a8}
.fate{font-size:12.5px;line-height:1.6;color:var(--ink);border-top:1px dashed var(--hair);padding-top:8px}
.fate small{color:var(--muted)}
.src{font-size:10.5px;color:#8a93a8;margin-top:6px}
.whyul,.frameol{font-size:12.5px;line-height:1.75;padding-left:20px;display:flex;flex-direction:column;gap:6px}
</style></head><body>
<div id="gate">
  <div class="lock">🔒</div>
  <p>열람 코드를 입력하세요</p>
  <input id="pw" type="password" inputmode="numeric" maxlength="8" autocomplete="off">
  <button id="go">열기</button>
  <div id="gerr"></div>
</div>
<div id="doc">

  <div class="sub">공개 자료 기반 · 교육용 · 비공개 열람</div>
  <div id="content"></div>
</div>

const b2a=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw=document.getElementById('pw').value.trim();
  const err=document.getElementById('gerr');
  if(!pw){err.textContent='코드를 입력하세요';return;}
  try{
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b2a(BLOB.s),iterations:150000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b2a(BLOB.i)},key,b2a(BLOB.d));
    document.getElementById('content').innerHTML=new TextDecoder().decode(pt);
    document.getElementById('gate').style.display='none';
    document.getElementById('doc').style.display='block';
    try{sessionStorage.setItem('ck',pw);}catch(e){}
  }catch(e){ err.textContent='코드가 맞지 않아요'; document.getElementById('pw').value=''; }
}
document.getElementById('go').addEventListener('click',unlock);
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')unlock();});
try{const c=sessionStorage.getItem('ck');if(c){document.getElementById('pw').value=c;unlock();}}catch(e){}
</script></body></html>
